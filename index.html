<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VIPAKA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#B43757">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.22);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #2c1810;
        }

        body {
            margin: 0; padding: 0; overflow: hidden;
            background: #243B55;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
            touch-action: none;
        }

        #game-container { 
            position: relative; 
            border-radius: 40px; 
            overflow: hidden; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
        }

        canvas { 
            display: block; 
            image-rendering: -webkit-optimize-contrast;
        }

        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            padding: 40px; border-radius: 35px;
            pointer-events: auto; text-align: center;
            width: 75%; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            color: white;
            transition: opacity 0.4s ease;
        }

        h1 { margin: 0 0 10px 0; font-size: 2.2rem; font-weight: 800; letter-spacing: 2px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        h2 { margin: 0; font-size: 1.4rem; color: #ffd54f; }
        p { font-size: 1rem; line-height: 1.4; opacity: 0.9; margin-bottom: 20px; }

        .credits {
            font-size: 0.75rem;
            margin-top: 25px;
            opacity: 0.6;
            line-height: 1.4;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }

        .credits a {
            color: #ffd54f;
            text-decoration: none;
            font-weight: bold;
        }

        button {
            background: #fff; color: #2c1810; border: none;
            padding: 16px 38px; font-size: 1.1rem; font-weight: 700;
            border-radius: 100px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.5; }

        .score-pill {
            position: absolute; top: 40px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 10px 25px; border-radius: 100px;
            font-weight: 700; color: white;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="scoreDisplay" class="score-pill">Equanimity: 0</div>
        
        <div id="start-menu" class="glass-panel">
            <h1>VIPAKA</h1>
            <p id="load-msg">Gathering the winds...</p>
            <button id="startBtn" disabled>Begin Journey</button>
            <div class="credits">
                Game made with love by <a href="https://instagram.com/rekoilchafe" target="_blank">Rekoil Chafe</a><br>
                in html js and help from Gemini.
            </div>
        </div>

        <div id="over-menu" class="glass-panel hidden">
            <h2 id="death-title">Return to Breath</h2>
            <p id="death-msg" style="font-style: italic; font-weight: 300;"></p>
            <button id="retryBtn">Return to Center</button>
            <div class="credits">
                Game made with love by <a href="https://instagram.com/rekoilchafe" target="_blank">Rekoil Chafe</a><br>
                in html js and help from Gemini.
            </div>
        </div>
    </div>
</div>

<script>
/**
 * ASSETS & MESSAGES
 */
const textures = { Mara: new Image(), Devadatta: new Image(), Angulimala: new Image(), Player: new Image() };
const sounds = {
    bg: new Audio('JaymangalAtthagathaPiano.mp3'),
    mara: new Audio('marafx.mp3'),
    angulimala: new Audio('angulimalafx.wav'),
    devadatta: new Audio('devdattafx.wav')
};

const LORE = {
    Mara: { title: "Illusions Discovered", msg: "Mara's dance of desire clouded the vision. Release the heart's longing to see clearly." },
    Angulimala: { title: "Peace Shattered", msg: "The ghosts of old anger struck swift. Meet the world with a soft hand, not a clenched fist." },
    Devadatta: { title: "The Weight of Pride", msg: "Devadatta’s ego fell like a stone. A heavy mind cannot float on the celestial winds." },
    Obstacle: { title: "Clinging to Extremes", msg: "The pillars of attachment closed in. The Middle Path is found only by letting go of the sides." },
    Boundary: { title: "Mindfulness Drifted", msg: "The breath was lost to the void. Return your awareness to the silent center." }
};

sounds.bg.volume = 0.3; sounds.bg.loop = true;

let loaded = 0;
const checkAssets = () => {
    if(++loaded === 4) {
        document.getElementById('startBtn').disabled = false;
        document.getElementById('load-msg').innerText = "Sound and spirit are aligned.";
    }
};

textures.Mara.onload = textures.Devadatta.onload = textures.Angulimala.onload = textures.Player.onload = checkAssets;
textures.Mara.src = 'mararef1.png'; textures.Devadatta.src = 'devdattaref1.png'; 
textures.Angulimala.src = 'angulimalaref1.png'; textures.Player.src = 'playerlotus.png';

const CONFIG = {
    gravity: 0.15, jump: -3.8, speed: 1.8, cloudSpeed: 0.3,
    gap: 300, spawnRate: 180, lotusMercy: 0.45,
    states: { IDLE: 'IDLE', GATHER: 'GATHER', RELEASE: 'RELEASE' }
};

class Cloud {
    constructor(w) { this.reset(w, true); }
    reset(w, init = false) {
        this.x = init ? Math.random() * w : w + 100;
        this.y = Math.random() * 200;
        this.scale = 0.5 + Math.random() * 0.8;
        this.opacity = 0.15;
    }
    update() { this.x -= CONFIG.cloudSpeed; }
    draw(ctx) {
        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
        ctx.beginPath(); ctx.arc(this.x | 0, this.y | 0, (30 * this.scale) | 0, 0, Math.PI * 2); ctx.fill();
    }
}

class Lotus {
    constructor() { this.radius = 20; this.reset(); }
    reset() { this.x = 100; this.y = 350; this.velocity = 0; }
    jump() { this.velocity = CONFIG.jump; }
    update() { this.velocity += CONFIG.gravity; this.y += this.velocity; }
    draw(ctx) {
        const x = this.x | 0, y = this.y | 0;
        ctx.fillStyle = "rgba(255, 255, 255, 0.25)";
        ctx.beginPath(); ctx.arc(x, y, 40, 0, Math.PI * 2); ctx.fill();
        if (textures.Player.complete) ctx.drawImage(textures.Player, x - 35, y - 35, 70, 70);
    }
}

class Projectile {
    constructor(x, y, vName, yOff = 0) {
        this.x = x; this.y = y + yOff; this.vName = vName; this.radius = vName === 'Devadatta' ? 12 : 6;
        let baseS = vName === 'Angulimala' ? 4.5 : 3.5;
        if (vName === 'Devadatta') {
            const rad = (Math.random() * 30 - 15) * (Math.PI / 180);
            this.vx = -baseS * Math.cos(rad); this.vy = baseS * Math.sin(rad);
        } else { this.vx = -baseS; this.vy = 0; }
    }
    update() { this.x += this.vx; this.y += this.vy; }
    draw(ctx) {
        const x = this.x | 0, y = this.y | 0;
        ctx.fillStyle = this.vName === 'Mara' ? "#ff4081" : "#37474f";
        ctx.beginPath(); ctx.arc(x, y, this.radius, 0, Math.PI * 2); ctx.fill();
    }
}

class Villain {
    constructor(x, gapY, name) {
        this.x = x; this.y = gapY + (CONFIG.gap / 2); this.name = name;
        this.state = CONFIG.states.IDLE; this.timer = 0;
        this.durations = { IDLE: 60, GATHER: 50, RELEASE: 40 };
        this.activeSounds = [];
    }
    update(projs) {
        this.x -= CONFIG.speed; this.timer++;
        if(this.state === CONFIG.states.IDLE && this.timer > this.durations.IDLE) this.transition(CONFIG.states.GATHER);
        else if(this.state === CONFIG.states.GATHER && this.timer > this.durations.GATHER) { this.transition(CONFIG.states.RELEASE); this.fire(projs); }
        else if(this.state === CONFIG.states.RELEASE && this.timer > this.durations.RELEASE) this.transition(CONFIG.states.IDLE);
        this.activeSounds = this.activeSounds.filter(s => !s.ended);
    }
    fire(projs) {
        const soundKey = this.name.toLowerCase();
        if (sounds[soundKey]) {
            const sfx = sounds[soundKey].cloneNode(); sfx.play().catch(() => {});
            this.activeSounds.push(sfx);
        }
        if(this.name === 'Mara') {
            const c = Math.random() > 0.5 ? 3 : 2;
            for(let i=0; i<c; i++) projs.push(new Projectile(this.x, this.y, this.name, (i - (c-1)/2)*35));
        } else projs.push(new Projectile(this.x, this.y, this.name));
    }
    stopAllSounds() { this.activeSounds.forEach(s => { s.pause(); s.currentTime = 0; }); this.activeSounds = []; }
    transition(s) { this.state = s; this.timer = 0; }
    draw(ctx) {
        const x = this.x | 0, y = this.y | 0;
        let frameX = this.state === CONFIG.states.GATHER ? 75 : (this.state === CONFIG.states.RELEASE ? 150 : 0);
        if (textures[this.name].complete) ctx.drawImage(textures[this.name], frameX, 0, 75, 75, x - 45, y - 45, 90, 90);
    }
}

class Obstacle {
    constructor(w, h) { this.x = w; this.width = 80; this.gapY = Math.random() * (h - CONFIG.gap - 160) + 80; this.passed = false; }
    update() { this.x -= CONFIG.speed; }
    draw(ctx, h) {
        const x = this.x | 0, gy = this.gapY | 0;
        ctx.fillStyle = "rgba(52, 73, 94, 0.9)";
        ctx.fillRect(x, 0, this.width, gy);
        ctx.fillRect(x, gy + CONFIG.gap, this.width, h - (gy + CONFIG.gap));
    }
}

class GameEngine {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d', { alpha: false });
        this.offscreenSky = document.createElement('canvas');
        this.setupRetina();
        this.lotus = new Lotus();
        this.clouds = [new Cloud(this.virtualW), new Cloud(this.virtualW), new Cloud(this.virtualW)];
        this.running = false; 
        this.initControls();
    }

    setupRetina() {
        const dpr = window.devicePixelRatio || 1;
        this.virtualW = Math.min(window.innerWidth * 0.95, 420);
        this.virtualH = Math.min(window.innerHeight * 0.88, 700);
        this.canvas.width = this.virtualW * dpr;
        this.canvas.height = this.virtualH * dpr;
        this.canvas.style.width = this.virtualW + 'px';
        this.canvas.style.height = this.virtualH + 'px';
        this.ctx.scale(dpr, dpr);

        this.offscreenSky.width = this.canvas.width;
        this.offscreenSky.height = this.canvas.height;
        const osCtx = this.offscreenSky.getContext('2d');
        const sky = osCtx.createLinearGradient(0, 0, 0, this.virtualH * dpr);
        sky.addColorStop(0, "#243B55"); sky.addColorStop(0.7, "#B43757"); sky.addColorStop(1, "#F8CDDA");
        osCtx.fillStyle = sky; osCtx.fillRect(0, 0, this.canvas.width, this.canvas.height);
    }

    initControls() {
        const act = (e) => { if(this.running) this.lotus.jump(); e.preventDefault(); };
        this.canvas.addEventListener('touchstart', act, {passive: false});
        this.canvas.addEventListener('mousedown', act);
        document.getElementById('startBtn').onclick = () => { sounds.bg.play(); this.start(); };
        document.getElementById('retryBtn').onclick = () => { this.villains.forEach(v => v.stopAllSounds()); this.start(); };
    }

    start() {
        this.obstacles = []; this.villains = []; this.projectiles = []; this.score = 0; this.frame = 0;
        this.lotus.reset(); this.running = true;
        document.getElementById('start-menu').classList.add('hidden'); document.getElementById('over-menu').classList.add('hidden');
        this.loop();
    }

    stop(killerType) {
        this.running = false;
        this.villains.forEach(v => v.stopAllSounds());
        const data = LORE[killerType];
        document.getElementById('death-title').innerText = data.title;
        document.getElementById('death-msg').innerText = data.msg;
        document.getElementById('over-menu').classList.remove('hidden');
    }

    update() {
        this.lotus.update(); this.clouds.forEach(c => { c.update(); if(c.x < -150) c.reset(this.virtualW); });
        
        if(this.lotus.y < 0 || this.lotus.y > this.virtualH) return this.stop("Boundary");
        
        if(++this.frame % CONFIG.spawnRate === 0) {
            const o = new Obstacle(this.virtualW, this.virtualH); this.obstacles.push(o);
            const vNames = ['Devadatta', 'Mara', 'Angulimala'];
            this.villains.push(new Villain(this.virtualW + 100, o.gapY, vNames[Math.floor(Math.random()*3)]));
        }

        this.obstacles.forEach((o, i) => {
            o.update();
            if(this.lotus.x + 10 > o.x && this.lotus.x - 10 < o.x + o.width) {
                if(this.lotus.y - 10 < o.gapY || this.lotus.y + 10 > o.gapY + CONFIG.gap) return this.stop("Obstacle");
            }
            if(!o.passed && o.x < this.lotus.x) { o.passed = true; this.score++; }
            if(o.x < -100) this.obstacles.splice(i, 1);
        });

        this.villains.forEach((v, i) => {
            v.update(this.projectiles);
            if(v.x < -100) { v.stopAllSounds(); this.villains.splice(i, 1); }
        });

        this.projectiles.forEach((p, i) => {
            p.update(); if(Math.hypot(p.x - this.lotus.x, p.y - this.lotus.y) < 22) return this.stop(p.vName);
            if(p.x < -50) this.projectiles.splice(i, 1);
        });
        document.getElementById('scoreDisplay').innerText = `Equanimity: ${this.score}`;
    }

    draw() {
        this.ctx.drawImage(this.offscreenSky, 0, 0, this.canvas.width, this.canvas.height, 0, 0, this.virtualW, this.virtualH);
        this.clouds.forEach(c => c.draw(this.ctx));
        this.obstacles.forEach(o => o.draw(this.ctx, this.virtualH));
        this.villains.forEach(v => v.draw(this.ctx));
        this.projectiles.forEach(p => p.draw(this.ctx));
        this.lotus.draw(this.ctx);
    }
    loop() { if(!this.running) return; this.update(); this.draw(); requestAnimationFrame(() => this.loop()); }
}
const game = new GameEngine(); game.draw();
</script>
</body>
</html>
