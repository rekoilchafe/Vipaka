<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIPAKA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#B43757">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.22);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #2c1810;
        }
        body {
            margin: 0; padding: 0; overflow: hidden;
            background: #243B55;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
            touch-action: none;
        }
        #game-container { 
            position: relative; 
            border-radius: 40px; 
            overflow: hidden; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
        }
        canvas { display: block; cursor: pointer; image-rendering: auto; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px); /* Reduced for mobile speed */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 40px; border-radius: 35px;
            pointer-events: auto; text-align: center;
            width: 75%; color: var(--text-main);
        }
        button {
            background: #fff; color: #000; border: none;
            padding: 16px 38px; font-size: 1.1rem; font-weight: 600;
            border-radius: 100px; cursor: pointer;
        }
        button:disabled { opacity: 0.5; }
        .score-pill {
            position: absolute; top: 30px;
            background: rgba(255,255,255,0.7);
            padding: 12px 28px; border-radius: 100px;
            font-weight: 700; color: var(--text-main);
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="scoreDisplay" class="score-pill">Equanimity: 0</div>
        <div id="start-menu" class="glass-panel">
            <h1>VIPAKA</h1>
            <p id="load-msg">Gathering stillness...</p>
            <button id="startBtn" disabled>Begin Journey</button>
        </div>
        <div id="over-menu" class="glass-panel hidden">
            <h2 id="reason" style="margin:0">Return to Breath</h2>
            <p id="lore-text" style="font-size: 0.9rem; margin: 15px 0; font-style: italic;"></p>
            <button id="retryBtn">Try Again</button>
        </div>
    </div>
</div>

<script>
const textures = { Mara: new Image(), Devadatta: new Image(), Angulimala: new Image(), Player: new Image() };
let loaded = 0;
const onLoad = () => { if(++loaded === 4) { document.getElementById('startBtn').disabled = false; document.getElementById('load-msg').innerText = "Breathe deeply. Drift slowly."; } };
textures.Mara.onload = textures.Devadatta.onload = textures.Angulimala.onload = textures.Player.onload = onLoad;
textures.Mara.src = 'mararef1.png'; textures.Devadatta.src = 'devdattaref1.png'; textures.Angulimala.src = 'angulimalaref1.png'; textures.Player.src = 'playerlotus.png';

const CONFIG = {
    gravity: 0.10, jump: -2.8, speed: 1.3, cloudSpeed: 0.2,
    gap: 320, spawnRate: 260, lotusMercy: 0.5,
    states: { IDLE: 'IDLE', GATHER: 'GATHER', RELEASE: 'RELEASE' }
};

class Cloud {
    constructor(w) { this.reset(w, true); }
    reset(w, init = false) {
        this.x = init ? Math.random() * w : w + 100;
        this.y = Math.random() * 250;
        this.scale = 0.5 + Math.random() * 0.8;
        this.opacity = 0.15 + Math.random() * 0.15;
    }
    update() { this.x -= CONFIG.cloudSpeed; }
    draw(ctx) {
        ctx.fillStyle = `rgba(240, 230, 255, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x | 0, this.y | 0, (30 * this.scale) | 0, 0, Math.PI * 2);
        ctx.fill();
    }
}

class Lotus {
    constructor() { this.radius = 20; this.reset(); }
    reset() { this.x = 100; this.y = 350; this.velocity = 0; }
    jump() { this.velocity = CONFIG.jump; }
    update() { this.velocity += CONFIG.gravity; this.y += this.velocity; }
    draw(ctx) {
        const x = this.x | 0, y = this.y | 0;
        // Optimized glow: Radial gradient is faster than shadowBlur
        const g = ctx.createRadialGradient(x, y, 5, x, y, 40);
        g.addColorStop(0, "rgba(255, 255, 255, 0.4)");
        g.addColorStop(1, "rgba(255, 255, 255, 0)");
        ctx.fillStyle = g;
        ctx.fillRect(x - 40, y - 40, 80, 80);
        if (textures.Player.complete) ctx.drawImage(textures.Player, x - 35, y - 35, 70, 70);
    }
}

class Projectile {
    constructor(x, y, vName, yOff = 0) {
        this.x = x; this.y = y + yOff; this.vName = vName;
        this.radius = vName === 'Devadatta' ? 12 : 6;
        let baseS = vName === 'Angulimala' ? 3.5 : 2.5;
        if (vName === 'Devadatta') {
            const rad = (Math.random() * 30 - 15) * (Math.PI / 180);
            this.vx = -baseS * Math.cos(rad); this.vy = baseS * Math.sin(rad);
        } else { this.vx = -baseS; this.vy = 0; }
        this.rot = 0;
    }
    update() { this.x += this.vx; this.y += this.vy; this.rot += 0.05; }
    draw(ctx) {
        const x = this.x | 0, y = this.y | 0;
        ctx.save();
        ctx.translate(x, y);
        if (this.vName === 'Mara') {
            ctx.fillStyle = "#ff4081";
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.bezierCurveTo(-5, -5, -10, 0, 0, 8); ctx.bezierCurveTo(10, 0, 5, -5, 0, 0); ctx.fill();
        } else if (this.vName === 'Devadatta') {
            ctx.rotate(this.rot); ctx.fillStyle = "#37474f"; ctx.fillRect(-8, -8, 16, 16);
        } else {
            ctx.rotate(-Math.PI/2); ctx.fillStyle = "#4e342e"; ctx.fillRect(-3, -7, 6, 12);
        }
        ctx.restore();
    }
}

class Villain {
    constructor(x, gapY, name) {
        this.x = x; this.y = gapY + (CONFIG.gap / 2); this.name = name;
        this.state = CONFIG.states.IDLE; this.timer = 0;
        this.durations = { IDLE: 140, GATHER: 100, RELEASE: 50 };
    }
    update(projs) {
        this.x -= CONFIG.speed; this.timer++;
        if(this.state === CONFIG.states.IDLE && this.timer > this.durations.IDLE) this.transition(CONFIG.states.GATHER);
        else if(this.state === CONFIG.states.GATHER && this.timer > this.durations.GATHER) { this.transition(CONFIG.states.RELEASE); this.fire(projs); }
        else if(this.state === CONFIG.states.RELEASE && this.timer > this.durations.RELEASE) this.transition(CONFIG.states.IDLE);
    }
    fire(projs) {
        if(this.name === 'Mara') {
            const c = Math.random() > 0.5 ? 3 : 2;
            for(let i=0; i<c; i++) projs.push(new Projectile(this.x, this.y, this.name, (i - (c-1)/2)*35));
        } else projs.push(new Projectile(this.x, this.y, this.name));
    }
    transition(s) { this.state = s; this.timer = 0; }
    draw(ctx) {
        const x = this.x | 0, y = this.y | 0;
        let frameX = this.state === CONFIG.states.GATHER ? 75 : (this.state === CONFIG.states.RELEASE ? 150 : 0);
        
        // Fast Glow Circle
        const g = ctx.createRadialGradient(x, y, 5, x, y, 50);
        g.addColorStop(0, this.state === 'GATHER' ? "rgba(255, 183, 77, 0.2)" : "rgba(255, 255, 255, 0.1)");
        g.addColorStop(1, "rgba(255, 255, 255, 0)");
        ctx.fillStyle = g;
        ctx.fillRect(x - 50, y - 50, 100, 100);

        if (textures[this.name].complete) {
            ctx.drawImage(textures[this.name], frameX, 0, 75, 75, x - 37, y - 37, 75, 75);
        }
    }
}

class Obstacle {
    constructor(w, h) { this.x = w; this.width = 80; this.gapY = Math.random() * (h - CONFIG.gap - 160) + 80; this.passed = false; }
    update() { this.x -= CONFIG.speed; }
    draw(ctx, h) {
        const x = this.x | 0, gy = this.gapY | 0;
        ctx.fillStyle = "#34495e";
        ctx.beginPath(); ctx.roundRect(x, 0, this.width, gy, 15); ctx.fill();
        ctx.beginPath(); ctx.roundRect(x, gy + CONFIG.gap, this.width, h - (gy + CONFIG.gap), 15); ctx.fill();
    }
}

class GameEngine {
    constructor() {
        this.canvas = document.getElementById('gameCanvas'); this.ctx = this.canvas.getContext('2d', { alpha: false });
        this.resize(); this.lotus = new Lotus();
        this.clouds = [new Cloud(this.canvas.width), new Cloud(this.canvas.width), new Cloud(this.canvas.width)];
        this.running = false; this.initControls();
    }
    resize() { this.canvas.width = Math.min(window.innerWidth * 0.95, 420); this.canvas.height = Math.min(window.innerHeight * 0.88, 700); }
    initControls() {
        const act = (e) => { if(this.running) this.lotus.jump(); if(e.type === 'touchstart') e.preventDefault(); };
        window.addEventListener('keydown', (e) => { if(e.code === 'Space') act(e); });
        this.canvas.addEventListener('touchstart', act, {passive: false});
        this.canvas.addEventListener('mousedown', act);
        document.getElementById('startBtn').onclick = () => this.start();
        document.getElementById('retryBtn').onclick = () => this.start();
    }
    start() {
        this.obstacles = []; this.villains = []; this.projectiles = []; this.score = 0; this.frame = 0;
        this.lotus.reset(); this.running = true;
        document.getElementById('start-menu').classList.add('hidden'); document.getElementById('over-menu').classList.add('hidden');
        this.loop();
    }
    stop(msg, lore) {
        this.running = false; document.getElementById('over-menu').classList.remove('hidden');
        document.getElementById('reason').innerText = msg; document.getElementById('lore-text').innerText = lore;
    }
    update() {
        this.lotus.update(); this.clouds.forEach(c => { c.update(); if(c.x < -150) c.reset(this.canvas.width); });
        if(this.lotus.y < 0 || this.lotus.y > this.canvas.height) return this.stop("Gently Return", "Equanimity is simply returning to center.");
        if(++this.frame % CONFIG.spawnRate === 0) {
            const o = new Obstacle(this.canvas.width, this.canvas.height); this.obstacles.push(o);
            const vNames = ['Devadatta', 'Mara', 'Angulimala'];
            this.villains.push(new Villain(this.canvas.width + 120, o.gapY, vNames[Math.floor(Math.random()*3)]));
        }
        this.obstacles.forEach((o, i) => {
            o.update();
            const lr = 10;
            if(this.lotus.x + lr > o.x && this.lotus.x - lr < o.x + o.width) {
                if(this.lotus.y - lr < o.gapY || this.lotus.y + lr > o.gapY + CONFIG.gap) return this.stop("Be Gentle", "The extremes are heavy.");
            }
            if(!o.passed && o.x < this.lotus.x) { o.passed = true; this.score++; }
            if(o.x + o.width < -100) this.obstacles.splice(i, 1);
        });
        this.villains.forEach(v => v.update(this.projectiles));
        this.projectiles.forEach((p, i) => {
            p.update(); if(Math.hypot(p.x - this.lotus.x, p.y - this.lotus.y) < 20) return this.stop("Peace Disturbed", "Thoughts arise and dissolve.");
            if(p.x < -50) this.projectiles.splice(i, 1);
        });
        document.getElementById('scoreDisplay').innerText = `Equanimity: ${this.score}`;
    }
    draw() {
        // Fast Gradient Background
        const sky = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
        sky.addColorStop(0, "#243B55"); sky.addColorStop(0.7, "#B43757"); sky.addColorStop(1, "#F8CDDA");
        this.ctx.fillStyle = sky;
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        this.clouds.forEach(c => c.draw(this.ctx));
        this.obstacles.forEach(o => o.draw(this.ctx, this.canvas.height));
        this.villains.forEach(v => v.draw(this.ctx));
        this.projectiles.forEach(p => p.draw(this.ctx));
        this.lotus.draw(this.ctx);
    }
    loop() { if(!this.running) return; this.update(); this.draw(); requestAnimationFrame(() => this.loop()); }
}
const game = new GameEngine(); game.draw();
</script>
</body>
</html>
