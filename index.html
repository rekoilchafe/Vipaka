<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIPAKA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#B43757">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.22);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #2c1810;
        }

        body {
            margin: 0; padding: 0; overflow: hidden;
            background: radial-gradient(circle at center, #f5efeb 0%, #c5b9a5 100%);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
            touch-action: none;
        }

        #game-container { 
            position: relative; 
            border-radius: 40px; 
            overflow: hidden; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
        }

        canvas { display: block; cursor: pointer; }

        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            padding: 35px; border-radius: 35px;
            pointer-events: auto; text-align: center;
            width: 75%; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            color: var(--text-main);
        }

        button {
            background: #fff; color: #000; border: none;
            padding: 16px 38px; font-size: 1.1rem; font-weight: 600;
            border-radius: 100px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        button:active { transform: scale(0.92); }

        .score-pill {
            position: absolute; top: 30px;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(12px);
            padding: 12px 28px; border-radius: 100px;
            font-weight: 700; border: 1px solid var(--glass-border);
            letter-spacing: 0.5px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="scoreDisplay" class="score-pill">Equanimity: 0</div>
        
        <div id="start-menu" class="glass-panel">
            <h1 style="margin:0 0 10px 0; font-weight: 800; font-size: 2rem;">VIPAKA</h1>
            <p>Master the Middle Path.<br>Find balance between the extremes.</p>
            <button id="startBtn">Begin Journey</button>
        </div>

        <div id="over-menu" class="glass-panel hidden">
            <h2 id="reason" style="margin:0; font-size: 1.6rem;">Focus Broken</h2>
            <p id="lore-text" style="font-size: 0.95rem; margin: 15px 0; opacity: 0.85;"></p>
            <button id="retryBtn">Return to Center</button>
        </div>
    </div>
</div>

<script>
/**
 * ASSET PRELOADING
 */
const textures = {
    Mara: new Image(), Devadatta: new Image(), Angulimala: new Image(), Player: new Image()
};
textures.Mara.src = 'mararef1.png';
textures.Devadatta.src = 'devdattaref1.png';
textures.Angulimala.src = 'angulimalaref1.png';
textures.Player.src = 'playerlotus.png';

/**
 * ORIGINAL SNAPPY CONFIG
 */
const CONFIG = {
    gravity: 0.21,
    jump: -4.8,
    speed: 2.7,
    gap: 255, 
    spawnRate: 110,
    lotusMercy: 0.6,
    states: { IDLE: 'IDLE', GATHER: 'GATHER', RELEASE: 'RELEASE' }
};

class Lotus {
    constructor(ctx) {
        this.ctx = ctx;
        this.radius = 22;
        this.reset();
    }
    reset() { this.x = 100; this.y = 320; this.velocity = 0; }
    jump() { this.velocity = CONFIG.jump; }
    update() {
        this.velocity += CONFIG.gravity;
        this.y += this.velocity;
    }
    draw() {
        this.ctx.save();
        this.ctx.translate(this.x, this.y);
        
        // Full Glow & Shadow Restored
        this.ctx.shadowBlur = 25;
        this.ctx.shadowColor = "rgba(255, 255, 255, 0.9)";
        
        if (textures.Player.complete) {
            this.ctx.drawImage(textures.Player, -45, -45, 90, 90);
        }

        this.ctx.shadowBlur = 10;
        this.ctx.shadowColor = "rgba(0, 0, 0, 0.3)";
        this.ctx.shadowOffsetX = 4;
        this.ctx.shadowOffsetY = 4;
        this.ctx.restore();
    }
}

class Projectile {
    constructor(x, y, vName, yOffset = 0) {
        this.x = x; this.y = y + yOffset; this.vName = vName;
        this.radius = vName === 'Devadatta' ? 18 : 8;
        
        let baseSpeed = (vName === 'Angulimala') ? 8.5 : 5.5;
        
        if (vName === 'Devadatta') {
            const angleRad = (Math.random() * 40 - 20) * (Math.PI / 180);
            this.vx = -baseSpeed * Math.cos(angleRad);
            this.vy = baseSpeed * Math.sin(angleRad);
        } else {
            this.vx = -baseSpeed;
            this.vy = 0;
        }
        this.rotation = 0;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.rotation += 0.1;
    }
    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.shadowBlur = 20;
        if (this.vName === 'Mara') {
            ctx.fillStyle = "#f50057"; ctx.shadowColor = "#ff4081";
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.bezierCurveTo(-5, -5, -10, 0, 0, 8); ctx.bezierCurveTo(10, 0, 5, -5, 0, 0); ctx.fill();
        } else if (this.vName === 'Devadatta') {
            ctx.rotate(this.rotation);
            ctx.fillStyle = "#37474f"; ctx.shadowColor = "rgba(0,0,0,0.5)";
            ctx.beginPath(); ctx.roundRect(-this.radius, -this.radius, this.radius*2, this.radius*2, 4); ctx.fill();
        } else {
            ctx.fillStyle = "#4e342e"; ctx.shadowColor = "#fff";
            ctx.rotate(-Math.PI/2);
            ctx.beginPath(); ctx.roundRect(-4, -9, 8, 14, 4); ctx.fill();
            ctx.strokeStyle = "#000"; ctx.lineWidth = 1; ctx.stroke();
            ctx.fillStyle = "#fff"; ctx.fillRect(-2.5, -8.5, 5, 4);
        }
        ctx.restore();
    }
}

class Villain {
    constructor(x, gapY, name) {
        this.x = x;
        this.y = gapY + (CONFIG.gap / 2);
        this.name = name;
        this.state = CONFIG.states.IDLE;
        this.timer = 0;
        this.animFrame = 0;
        this.durations = { IDLE: 70, GATHER: 40, RELEASE: 20 };
    }
    update(projArr) {
        this.x -= CONFIG.speed;
        this.timer++;
        this.animFrame = Math.floor(this.timer / 2) % 8;
        switch(this.state) {
            case CONFIG.states.IDLE: if(this.timer > this.durations.IDLE) this.transition(CONFIG.states.GATHER); break;
            case CONFIG.states.GATHER: if(this.timer > this.durations.GATHER) { this.transition(CONFIG.states.RELEASE); this.fire(projArr); } break;
            case CONFIG.states.RELEASE: if(this.timer > this.durations.RELEASE) this.transition(CONFIG.states.IDLE); break;
        }
    }
    fire(projArr) {
        if (this.name === 'Mara') {
            const count = Math.random() > 0.5 ? 3 : 2;
            for(let i=0; i<count; i++) projArr.push(new Projectile(this.x, this.y, this.name, (i - (count-1)/2) * 35));
        } else projArr.push(new Projectile(this.x, this.y, this.name));
    }
    transition(s) { this.state = s; this.timer = 0; }
    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        const f = this.animFrame;
        let s = 1, ox = 0, glow = 15;
        let frameX = this.state === CONFIG.states.GATHER ? 300 : (this.state === CONFIG.states.RELEASE ? 600 : 0);

        if(this.state === CONFIG.states.IDLE) {
            s = 1 + (Math.sin((f/8)*Math.PI*2)*0.06); glow = 10 + f;
        } else if(this.state === CONFIG.states.GATHER) {
            ox = (f % 2 === 0) ? -3 : 3; s = 1 + (f/8)*0.4; glow = 15 + (f*4); ctx.shadowColor = "rgba(255, 82, 82, 0.8)";
        } else {
            s = 1.6 - (f/8); glow = 40 - (f*4); ctx.shadowColor = "#fff";
        }

        ctx.shadowBlur = glow;
        ctx.scale(s, s);
        const img = textures[this.name];
        if (img.complete) {
            ctx.drawImage(img, frameX, 0, 300, 300, -45 + ox, -45, 90, 90);
        }
        ctx.restore();
    }
}

class Obstacle {
    constructor(w, h) {
        this.x = w; this.width = 80;
        this.gapY = Math.random() * (h - CONFIG.gap - 140) + 70;
        this.passed = false;
    }
    update() { this.x -= CONFIG.speed; }
    draw(ctx, h) {
        const g = ctx.createLinearGradient(this.x, 0, this.x + this.width, 0);
        g.addColorStop(0, "#261a15"); g.addColorStop(0.5, "#5d4037"); g.addColorStop(1, "#261a15");
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.roundRect(this.x, -25, this.width, this.gapY + 25, 15); ctx.fill();
        ctx.beginPath(); ctx.roundRect(this.x, this.gapY + CONFIG.gap, this.width, h - (this.gapY + CONFIG.gap) + 25, 15); ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.12)"; ctx.lineWidth = 2; ctx.stroke();
    }
}

class GameEngine {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        this.lotus = new Lotus(this.ctx);
        this.running = false;
        this.initControls();
    }
    resize() {
        this.canvas.width = Math.min(window.innerWidth * 0.95, 420);
        this.canvas.height = Math.min(window.innerHeight * 0.88, 700);
    }
    initControls() {
        const act = (e) => { if(this.running) this.lotus.jump(); if(e.type === 'touchstart') e.preventDefault(); };
        window.addEventListener('keydown', (e) => { if(e.code === 'Space') act(e); });
        this.canvas.addEventListener('touchstart', act, {passive: false});
        this.canvas.addEventListener('mousedown', act);
        document.getElementById('startBtn').onclick = () => this.start();
        document.getElementById('retryBtn').onclick = () => this.start();
    }
    start() {
        this.obstacles = []; this.villains = []; this.projectiles = [];
        this.score = 0; this.frame = 0; this.lotus.reset();
        this.running = true;
        document.getElementById('start-menu').classList.add('hidden');
        document.getElementById('over-menu').classList.add('hidden');
        this.loop();
    }
    stop(msg, lore) {
        this.running = false;
        document.getElementById('over-menu').classList.remove('hidden');
        document.getElementById('reason').innerText = msg;
        document.getElementById('lore-text').innerText = lore;
    }
    update() {
        this.lotus.update();
        if(this.lotus.y < 0 || this.lotus.y > this.canvas.height) return this.stop("Middle Path Lost", "Extremes are traps.");
        if(this.frame % CONFIG.spawnRate === 0) {
            const o = new Obstacle(this.canvas.width, this.canvas.height);
            this.obstacles.push(o);
            const vNames = ['Devadatta', 'Mara', 'Angulimala'];
            this.villains.push(new Villain(this.canvas.width + 120, o.gapY, vNames[Math.floor(Math.random()*3)]));
        }
        this.obstacles.forEach((o, i) => {
            o.update();
            const lr = this.lotus.radius * CONFIG.lotusMercy;
            if(this.lotus.x + lr > o.x && this.lotus.x - lr < o.x + o.width) {
                if(this.lotus.y - lr < o.gapY || this.lotus.y + lr > o.gapY + CONFIG.gap) return this.stop("Attachment", "Released from form.");
            }
            if(!o.passed && o.x < this.lotus.x) { o.passed = true; this.score++; }
            if(o.x + o.width < 0) this.obstacles.splice(i, 1);
        });
        this.villains.forEach(v => v.update(this.projectiles));
        this.projectiles.forEach((p, i) => {
            p.update();
            const d = Math.hypot(p.x - this.lotus.x, p.y - this.lotus.y);
            if(d < (this.lotus.radius * CONFIG.lotusMercy) + p.radius) return this.stop("Spirit Hit", "A thought disturbed.");
            if(p.x < -50) this.projectiles.splice(i, 1);
        });
        document.getElementById('scoreDisplay').innerText = `Equanimity: ${this.score}`;
        this.frame++;
    }
    draw() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.obstacles.forEach(o => o.draw(this.ctx, this.canvas.height));
        this.villains.forEach(v => v.draw(this.ctx));
        this.projectiles.forEach(p => p.draw(this.ctx));
        this.lotus.draw();
    }
    loop() {
        if(!this.running) return;
        this.update(); this.draw();
        requestAnimationFrame(() => this.loop());
    }
}
const game = new GameEngine();
game.draw();
</script>
</body>
</html>
