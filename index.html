<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIPAKA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#B43757">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.22);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #2c1810;
        }

        body {
            margin: 0; padding: 0; overflow: hidden;
            background: linear-gradient(to bottom, #243B55 0%, #B43757 70%, #F8CDDA 100%);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
            touch-action: none;
        }

        #game-container { 
            position: relative; 
            border-radius: 40px; 
            overflow: hidden; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
        }

        canvas { display: block; cursor: pointer; }

        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            padding: 40px; border-radius: 35px;
            pointer-events: auto; text-align: center;
            width: 75%; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            color: var(--text-main);
        }

        button {
            background: #fff; color: #000; border: none;
            padding: 16px 38px; font-size: 1.1rem; font-weight: 600;
            border-radius: 100px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .score-pill {
            position: absolute; top: 30px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(12px);
            padding: 12px 28px; border-radius: 100px;
            font-weight: 700; border: 1px solid var(--glass-border);
            color: var(--text-main);
        }

        .hidden { display: none; opacity: 0; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="scoreDisplay" class="score-pill">Equanimity: 0</div>
        <div id="start-menu" class="glass-panel">
            <h1>VIPAKA</h1>
            <p id="load-msg">Gathering stillness...</p>
            <button id="startBtn" disabled>Begin Journey</button>
        </div>
        <div id="over-menu" class="glass-panel hidden">
            <h2 id="reason" style="margin:0">Return to Breath</h2>
            <p id="lore-text" style="font-size: 0.95rem; margin: 15px 0; font-style: italic;"></p>
            <button id="retryBtn">Try Again</button>
        </div>
    </div>
</div>

<script>
const textures = {
    Mara: new Image(), Devadatta: new Image(), Angulimala: new Image(), Player: new Image()
};
let loaded = 0;
const onLoad = () => {
    loaded++;
    if(loaded === 4) {
        document.getElementById('startBtn').disabled = false;
        document.getElementById('load-msg').innerText = "Breathe deeply. Drift slowly.";
    }
};
textures.Mara.onload = textures.Devadatta.onload = textures.Angulimala.onload = textures.Player.onload = onLoad;
textures.Mara.src = 'mararef1.png';
textures.Devadatta.src = 'devdattaref1.png';
textures.Angulimala.src = 'angulimalaref1.png';
textures.Player.src = 'playerlotus.png';

/**
 * DEEPLY MEDITATIVE CONFIG
 * Horizontal speed dropped to 1.3
 * Gravity dropped to 0.1 for maximum buoyancy
 */
const CONFIG = {
    gravity: 0.10,      
    jump: -2.8,         
    speed: 1.3,         
    cloudSpeed: 0.2,
    gap: 320,
    spawnRate: 260,     // Much more space between pillars
    lotusMercy: 0.5,
    states: { IDLE: 'IDLE', GATHER: 'GATHER', RELEASE: 'RELEASE' }
};

class Cloud {
    constructor(w) { this.reset(w, true); }
    reset(w, init = false) {
        this.x = init ? Math.random() * w : w + 100;
        this.y = Math.random() * 250;
        this.scale = 0.5 + Math.random() * 0.8;
        this.opacity = 0.2 + Math.random() * 0.2;
    }
    update() { this.x -= CONFIG.cloudSpeed; }
    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.scale(this.scale, this.scale);
        ctx.fillStyle = `rgba(240, 230, 255, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(0, 0, 30, 0, Math.PI * 2); ctx.arc(25, -15, 25, 0, Math.PI * 2);
        ctx.arc(50, 0, 30, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }
}

class Lotus {
    constructor() { this.radius = 22; this.reset(); }
    reset() { this.x = 100; this.y = 350; this.velocity = 0; }
    jump() { this.velocity = CONFIG.jump; }
    update() { this.velocity += CONFIG.gravity; this.y += this.velocity; }
    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.shadowBlur = 25;
        ctx.shadowColor = "rgba(255, 255, 255, 0.9)";
        if (textures.Player.complete) {
            ctx.drawImage(textures.Player, -40, -40, 80, 80);
        }
        ctx.restore();
    }
}

class Projectile {
    constructor(x, y, vName, yOff = 0) {
        this.x = x; this.y = y + yOff; this.vName = vName;
        this.radius = vName === 'Devadatta' ? 14 : 7;
        let baseS = vName === 'Angulimala' ? 3.5 : 2.5; // Projectiles slowed down
        if (vName === 'Devadatta') {
            const rad = (Math.random() * 40 - 20) * (Math.PI / 180);
            this.vx = -baseS * Math.cos(rad);
            this.vy = baseS * Math.sin(rad);
        } else { this.vx = -baseS; this.vy = 0; }
        this.rotation = 0;
    }
    update() { this.x += this.vx; this.y += this.vy; this.rotation += 0.03; }
    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.shadowBlur = 15;
        if (this.vName === 'Mara') {
            ctx.fillStyle = "rgba(255, 64, 129, 0.8)";
            ctx.shadowColor = "rgba(255, 64, 129, 0.4)";
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.bezierCurveTo(-5, -5, -10, 0, 0, 8); ctx.bezierCurveTo(10, 0, 5, -5, 0, 0); ctx.fill();
        } else if (this.vName === 'Devadatta') {
            ctx.rotate(this.rotation);
            ctx.fillStyle = "rgba(55, 71, 79, 0.8)"; ctx.shadowColor = "rgba(0,0,0,0.3)";
            ctx.beginPath(); ctx.roundRect(-this.radius, -this.radius, this.radius*2, this.radius*2, 4); ctx.fill();
        } else {
            ctx.fillStyle = "rgba(78, 52, 46, 1)"; ctx.shadowBlur = 8; ctx.shadowColor = "white";
            ctx.rotate(-Math.PI/2);
            ctx.beginPath(); ctx.roundRect(-4, -9, 8, 14, 4); ctx.fill();
            ctx.strokeStyle = "black"; ctx.lineWidth = 1.5; ctx.stroke();
            ctx.fillStyle = "white"; ctx.fillRect(-2.5, -8.5, 5, 4);
        }
        ctx.restore();
    }
}

class Villain {
    constructor(x, gapY, name) {
        this.x = x;
        this.y = gapY + (CONFIG.gap / 2);
        this.name = name;
        this.state = CONFIG.states.IDLE;
        this.timer = 0;
        this.animFrame = 0;
        // Longer cycles for slower sprite changes
        this.durations = { IDLE: 140, GATHER: 100, RELEASE: 50 };
    }
    update(projs) {
        this.x -= CONFIG.speed; this.timer++;
        // Animation loop is 50% slower (div by 6)
        this.animFrame = Math.floor(this.timer / 6) % 8;
        switch(this.state) {
            case CONFIG.states.IDLE: if(this.timer > this.durations.IDLE) this.transition(CONFIG.states.GATHER); break;
            case CONFIG.states.GATHER: if(this.timer > this.durations.GATHER) { this.transition(CONFIG.states.RELEASE); this.fire(projs); } break;
            case CONFIG.states.RELEASE: if(this.timer > this.durations.RELEASE) this.transition(CONFIG.states.IDLE); break;
        }
    }
    fire(projs) {
        if(this.name === 'Mara') {
            const c = Math.random() > 0.5 ? 3 : 2;
            for(let i=0; i<c; i++) projs.push(new Projectile(this.x, this.y, this.name, (i - (c-1)/2)*35));
        } else projs.push(new Projectile(this.x, this.y, this.name));
    }
    transition(s) { this.state = s; this.timer = 0; }
    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        let frameX = this.state === CONFIG.states.GATHER ? 300 : (this.state === CONFIG.states.RELEASE ? 600 : 0);
        let ox = (this.state === CONFIG.states.GATHER) ? (Math.random()-0.5)*0.8 : 0; // Jitter reduced
        if (textures[this.name].complete) {
            ctx.drawImage(textures[this.name], frameX, 0, 300, 300, -45 + ox, -45, 90, 90);
        }
        ctx.restore();
    }
}

class Obstacle {
    constructor(w, h) {
        this.x = w; this.width = 80;
        this.gapY = Math.random() * (h - CONFIG.gap - 160) + 80;
        this.passed = false;
    }
    update() { this.x -= CONFIG.speed; }
    draw(ctx, h) {
        const pillar = (x, y, width, height) => {
            const g = ctx.createLinearGradient(x, 0, x + width, 0);
            g.addColorStop(0, "rgba(44, 62, 80, 0.9)"); g.addColorStop(0.5, "rgba(52, 73, 94, 0.9)"); g.addColorStop(1, "rgba(44, 62, 80, 0.9)");
            ctx.fillStyle = g; ctx.beginPath(); ctx.roundRect(x, y, width, height, 15); ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.12)"; ctx.lineWidth = 1; ctx.stroke();
        };
        pillar(this.x, -25, this.width, this.gapY + 25);
        pillar(this.x, this.gapY + CONFIG.gap, this.width, h - (this.gapY + CONFIG.gap) + 25);
    }
}

class GameEngine {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        this.lotus = new Lotus();
        this.clouds = [new Cloud(this.canvas.width), new Cloud(this.canvas.width), new Cloud(this.canvas.width)];
        this.running = false;
        this.initControls();
    }
    resize() {
        this.canvas.width = Math.min(window.innerWidth * 0.95, 420);
        this.canvas.height = Math.min(window.innerHeight * 0.88, 700);
    }
    initControls() {
        const act = (e) => { if(this.running) this.lotus.jump(); if(e.type === 'touchstart') e.preventDefault(); };
        window.addEventListener('keydown', (e) => { if(e.code === 'Space') act(e); });
        this.canvas.addEventListener('touchstart', act, {passive: false});
        this.canvas.addEventListener('mousedown', act);
        document.getElementById('startBtn').onclick = () => this.start();
        document.getElementById('retryBtn').onclick = () => this.start();
    }
    start() {
        this.obstacles = []; this.villains = []; this.projectiles = [];
        this.score = 0; this.frame = 0; this.lotus.reset();
        this.running = true;
        document.getElementById('start-menu').classList.add('hidden');
        document.getElementById('over-menu').classList.add('hidden');
        this.loop();
    }
    stop(msg, lore) {
        this.running = false;
        document.getElementById('over-menu').classList.remove('hidden');
        document.getElementById('reason').innerText = msg;
        document.getElementById('lore-text').innerText = lore;
    }
    update() {
        this.lotus.update();
        this.clouds.forEach(c => { c.update(); if(c.x < -150) c.reset(this.canvas.width); });
        if(this.lotus.y < 0 || this.lotus.y > this.canvas.height) return this.stop("Gently Return", "Equanimity is simply returning to center.");
        if(this.frame % CONFIG.spawnRate === 0) {
            const o = new Obstacle(this.canvas.width, this.canvas.height);
            this.obstacles.push(o);
            const vNames = ['Devadatta', 'Mara', 'Angulimala'];
            this.villains.push(new Villain(this.canvas.width + 120, o.gapY, vNames[Math.floor(Math.random()*3)]));
        }
        this.obstacles.forEach((o, i) => {
            o.update();
            const lr = this.lotus.radius * CONFIG.lotusMercy;
            if(this.lotus.x + lr > o.x && this.lotus.x - lr < o.x + o.width) {
                if(this.lotus.y - lr < o.gapY || this.lotus.y + lr > o.gapY + CONFIG.gap) return this.stop("Be Gentle", "The extremes are heavy. Rest in the middle.");
            }
            if(!o.passed && o.x < this.lotus.x) { o.passed = true; this.score++; }
            if(o.x + o.width < 0) this.obstacles.splice(i, 1);
        });
        this.villains.forEach(v => v.update(this.projectiles));
        this.projectiles.forEach((p, i) => {
            p.update();
            const d = Math.hypot(p.x - this.lotus.x, p.y - this.lotus.y);
            if(d < (this.lotus.radius * CONFIG.lotusMercy) + p.radius) {
                const lore = { Mara: "Lust arises and dissolves. Stay centered.", Devadatta: "A heavy thought was held too long. Let it go.", Angulimala: "Anger breaks the peace. Return to stillness." };
                return this.stop("Peace Disturbed", lore[p.vName]);
            }
            if(p.x < -50) this.projectiles.splice(i, 1);
        });
        document.getElementById('scoreDisplay').innerText = `Equanimity: ${this.score}`;
        this.frame++;
    }
    draw() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.clouds.forEach(c => c.draw(this.ctx));
        this.obstacles.forEach(o => o.draw(this.ctx, this.canvas.height));
        this.villains.forEach(v => v.draw(this.ctx));
        this.projectiles.forEach(p => p.draw(this.ctx));
        this.lotus.draw(this.ctx);
    }
    loop() {
        if(!this.running) return;
        this.update(); this.draw();
        requestAnimationFrame(() => this.loop());
    }
}
const game = new GameEngine();
game.draw();
</script>
</body>
</html>
